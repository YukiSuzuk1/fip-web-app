<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIP Academy — 学習ゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/illustrations.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/screens.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "variant": "green-pro",
  "theme": "light",
  "screen": "home"
}/*EDITMODE-END*/;

const SCREENS = [
  { key:"home",      label:"ホーム",         render: () => <HomeScreen/> },
  { key:"quiz",      label:"クイズ",         render: () => <QuizScreen/> },
  { key:"flashcard", label:"フラッシュカード", render: () => <FlashcardScreen/> },
  { key:"progress",  label:"実績",           render: () => <ProgressScreen/> },
];

const VARIANTS = [
  { key:"green-pro",   label:"グリーン・プロ",    desc:"再エネ×プロフェッショナル" },
  { key:"solar-duo",   label:"ソーラー・デュオ", desc:"Duolingo風に明るく遊び心" },
  { key:"tech-dark",   label:"テック・ダーク",    desc:"未来的・高コントラスト" },
];

function App() {
  const saved = (()=>{ try { return JSON.parse(localStorage.getItem("fip_tweaks") || "null"); } catch { return null; } })();
  const [state, setState] = React.useState(() => ({ ...TWEAKS, ...(saved||{}) }));
  const [screen, setScreen] = React.useState(state.screen || "home");
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    localStorage.setItem("fip_tweaks", JSON.stringify({ ...state, screen }));
    document.documentElement.dataset.theme = state.variant === "tech-dark" ? "dark" : "light";
    document.documentElement.dataset.variant = state.variant;
  }, [state, screen]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setEditMode(true);
      else if (d.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...state, [k]: v };
    setState(next);
    try { window.parent.postMessage({ type:"__edit_mode_set_keys", edits:{ [k]: v }}, "*"); } catch {}
  };

  const activeScreen = SCREENS.find(s => s.key === screen) || SCREENS[0];

  // Variant-specific body class
  React.useEffect(() => {
    document.body.className = `variant-${state.variant}`;
  }, [state.variant]);

  return (
    <>
      <div className="app">
        <Sidebar activeKey={screen} onNavigate={setScreen}/>
        <div className="main">
          <Topbar/>
          <div className="content">
            {activeScreen.render()}
          </div>
        </div>
      </div>
      <MobileNav activeKey={screen} onNavigate={setScreen}/>

      {editMode && (
        <div className="tweaks">
          <div className="tweaks-header">
            <span>Tweaks</span>
            <IconBolt size={14}/>
          </div>
          <div className="tweaks-body">
            <div className="tweak-row">
              <label>バリアント</label>
              <div className="tweak-opts" style={{flexDirection:"column"}}>
                {VARIANTS.map(v => (
                  <button key={v.key}
                    className={state.variant===v.key?"active":""}
                    onClick={()=>setTweak("variant", v.key)}
                    style={{textAlign:"left",padding:"10px 12px"}}>
                    <div style={{fontSize:12,fontWeight:700}}>{v.label}</div>
                    <div style={{fontSize:10,opacity:0.75,marginTop:2}}>{v.desc}</div>
                  </button>
                ))}
              </div>
            </div>
            <div className="tweak-row">
              <label>画面</label>
              <div className="tweak-opts">
                {SCREENS.map(s => (
                  <button key={s.key}
                    className={screen===s.key?"active":""}
                    onClick={()=>setScreen(s.key)}>
                    {s.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<style>
/* ── Variant: Solar Duo (Duolingo-forward, playful) ── */
.variant-solar-duo .hero {
  background:
    radial-gradient(circle at 80% 20%, oklch(0.88 0.17 85 / 0.5), transparent 60%),
    radial-gradient(circle at 15% 85%, oklch(0.72 0.18 150 / 0.35), transparent 60%),
    linear-gradient(135deg, oklch(0.72 0.17 150) 0%, oklch(0.55 0.14 170) 100%);
}
.variant-solar-duo .brand-mark {
  background: linear-gradient(135deg, oklch(0.72 0.17 150) 0%, oklch(0.78 0.16 85) 100%);
}
.variant-solar-duo .tile:hover { border-color: var(--solar); }
.variant-solar-duo .path-node.current { animation-duration: 1.4s; }
.variant-solar-duo .btn-primary {
  background: var(--grass);
  border-radius: 999px;
  font-weight: 700;
}

/* ── Variant: Tech Dark ── */
.variant-tech-dark .hero {
  background:
    radial-gradient(circle at 80% 20%, oklch(0.72 0.18 150 / 0.35), transparent 55%),
    radial-gradient(circle at 15% 85%, oklch(0.55 0.20 260 / 0.40), transparent 60%),
    linear-gradient(135deg, oklch(0.14 0.03 200) 0%, oklch(0.10 0.02 230) 100%);
  border: 1px solid oklch(0.35 0.08 200);
}
.variant-tech-dark .brand-mark {
  background: linear-gradient(135deg, oklch(0.72 0.18 150), oklch(0.55 0.20 260));
}
</style>
</body>
</html>
